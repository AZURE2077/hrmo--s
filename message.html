<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR — Notice</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root,[data-theme="default"]{--bg:0 0 0;--alt:9 9 11;--card:24 24 27;--text:255 255 255;--muted:161 161 170;--accent:255 255 255;}
    [data-theme="cyberpunk"]{--bg:5 0 20;--alt:10 0 38;--card:25 5 70;--text:0 255 204;--muted:179 102 255;--accent:255 0 255;}
    [data-theme="matrix"]{--bg:0 5 0;--alt:0 15 0;--card:0 30 0;--text:0 255 0;--muted:0 170 0;--accent:0 255 0;}
    [data-theme="crimson"]{--bg:10 0 0;--alt:20 0 0;--card:35 0 0;--text:255 200 200;--muted:255 100 100;--accent:255 0 0;}
    [data-theme="abyss"]{--bg:0 5 15;--alt:0 10 30;--card:0 25 60;--text:150 200 255;--muted:100 150 200;--accent:0 150 255;}
    [data-theme="vaporwave"]{--bg:20 0 30;--alt:35 10 50;--card:55 20 80;--text:255 150 255;--muted:150 200 255;--accent:0 255 255;}
    [data-theme="gold"]{--bg:10 10 5;--alt:20 20 10;--card:35 30 15;--text:255 215 0;--muted:200 180 100;--accent:255 180 0;}

    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{background:rgb(var(--bg));color:rgb(var(--text));font-family:'Inter',sans-serif;}

    #bg-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}

    .wrapper{
      position:relative;z-index:10;
      height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:24px;
    }

    .card{
      background:rgb(var(--card));
      border:1px solid rgb(var(--text)/.08);
      border-radius:20px;
      padding:48px 52px;
      max-width:580px;
      width:100%;
      position:relative;
      overflow:hidden;
      box-shadow:0 0 60px rgb(var(--accent)/.06);
    }

    /* subtle accent glow top-left */
    .card::before{
      content:'';
      position:absolute;
      top:-60px;left:-60px;
      width:200px;height:200px;
      background:radial-gradient(circle, rgb(var(--accent)/.12), transparent 70%);
      pointer-events:none;
    }

    .logo{
      font-family:'Press Start 2P',cursive;
      font-size:13px;
      color:rgb(var(--accent));
      letter-spacing:.08em;
      margin-bottom:32px;
      display:flex;align-items:center;gap:10px;
    }

    .logo-dot{
      width:8px;height:8px;
      border-radius:50%;
      background:rgb(var(--accent));
      box-shadow:0 0 8px rgb(var(--accent)/.6);
      animation:pulse 2s ease-in-out infinite;
    }

    .divider{
      width:40px;height:2px;
      background:rgb(var(--accent)/.3);
      border-radius:2px;
      margin-bottom:28px;
    }

    /* ── EDIT YOUR MESSAGE BELOW ── */
    .message-title{
      font-size:22px;
      font-weight:800;
      color:rgb(var(--text));
      line-height:1.35;
      margin-bottom:16px;
    }

    .message-body{
      font-size:14px;
      font-weight:400;
      color:rgb(var(--muted));
      line-height:1.75;
    }
    /* ── END MESSAGE AREA ── */

    .footer{
      margin-top:36px;
      padding-top:20px;
      border-top:1px solid rgb(var(--text)/.06);
      font-size:11px;
      font-weight:600;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgb(var(--muted)/.5);
    }

    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .card{animation:fadeIn .5s ease-out both;}
  </style>
</head>

<body data-theme="default">
<canvas id="bg-canvas"></canvas>

<div class="wrapper">
  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      HR
    </div>
    <div class="divider"></div>

    <!-- ════════════════════════════════════════
         EDIT YOUR MESSAGE HERE
         Change the title and body text freely.
         ════════════════════════════════════════ -->
    <div class="message-title">
      Warning
    </div>
    <div class="message-body">
      Live Sports will only be broadcasted if they are highly requested by the users. Also note the third party streaming platform may have a lot of ads and spam that the owner is not liable for. Sports can be requested in the whatsapp channel on the main site.
    </div>
    <!-- ════════════════════════════════════════
         END OF MESSAGE
         ════════════════════════════════════════ -->

    <div class="footer">Heartrive &nbsp;·&nbsp; HR Network</div>
  </div>
</div>

<script>
  // ── Dot particle background (matches main site) ──
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let dots = [], W, H;

  function getAccent() {
    const v = getComputedStyle(document.body).getPropertyValue('--accent').trim();
    const [r,g,b] = v.split(' ').map(Number);
    return {r,g,b};
  }

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initDots() {
    dots = Array.from({length: 60}, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.4 + .4,
      vx: (Math.random() - .5) * .3,
      vy: (Math.random() - .5) * .3,
      o: Math.random() * .35 + .05
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const {r,g,b} = getAccent();
    dots.forEach(d => {
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${d.o})`;
      ctx.fill();
      d.x += d.vx; d.y += d.vy;
      if (d.x < 0 || d.x > W) d.vx *= -1;
      if (d.y < 0 || d.y > H) d.vy *= -1;
    });
    requestAnimationFrame(draw);
  }

  resize(); initDots(); draw();
  window.addEventListener('resize', () => { resize(); initDots(); });
</script>
</body>
</html>
